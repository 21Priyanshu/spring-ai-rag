services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres

    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: